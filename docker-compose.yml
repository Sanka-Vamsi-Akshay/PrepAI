version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: prepai_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_interview_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_interview_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prepai_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: prepai_backend
    restart: always
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_interview_db?schema=public
      - JWT_SECRET=super_secret_jwt_key_change_me_in_production
      - CORS_ORIGIN=http://localhost:8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANALYTICS_CACHE_TTL_SECONDS=300
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: prepai_worker
    restart: always
    command: npm run worker:dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_interview_db?schema=public
      - JWT_SECRET=super_secret_jwt_key_change_me_in_production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prepai_frontend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
